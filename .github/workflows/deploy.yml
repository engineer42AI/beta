name: Deploy Beta App
on:
  push:
    branches: [ deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 0) Quick SSH smoke test
      - name: SSH smoke test
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}        # e.g. beta.engineer42.ai or 13.41.55.84
          username: ${{ secrets.SSH_USER }}    # ubuntu
          key: ${{ secrets.SSH_KEY }}          # your CI private key
          script_stop: true
          script: |
            set -euxo pipefail
            whoami
            hostname
            uname -a
            test -d /home/ubuntu/apps/beta

      # 1) Fail fast if required secrets are missing (runs on the runner)
      - name: Validate secrets present
        run: |
          set -euo pipefail
          test -n "${{ secrets.APP_BASE_URL }}" || (echo "::error::APP_BASE_URL missing" && exit 1)
          test -n "${{ secrets.COGNITO_DOMAIN }}" || (echo "::error::COGNITO_DOMAIN missing" && exit 1)
          test -n "${{ secrets.COGNITO_CLIENT_ID }}" || (echo "::error::COGNITO_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.COGNITO_CLIENT_SECRET }}" || (echo "::error::COGNITO_CLIENT_SECRET missing" && exit 1)
          test -n "${{ secrets.AWS_DEFAULT_REGION }}" || (echo "::error::AWS_DEFAULT_REGION missing" && exit 1)
          test -n "${{ secrets.OPENAI_API_KEY }}" || (echo "::error::OPENAI_API_KEY missing" && exit 1)
      

      # 2) Write .env.production on the server
      - name: Write env file remotely
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
          COGNITO_REDIRECT_URI: ${{ secrets.COGNITO_REDIRECT_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SUCCESS_URL: ${{ secrets.STRIPE_SUCCESS_URL }}
          STRIPE_CANCEL_URL: ${{ secrets.STRIPE_CANCEL_URL }}
          STRIPE_PRODUCTID_STARTER: ${{ secrets.STRIPE_PRODUCTID_STARTER }}
          STRIPE_PRODUCTID_PROFESSIONAL: ${{ secrets.STRIPE_PRODUCTID_PROFESSIONAL }}
          STRIPE_PRODUCTID_ENTERPRISE: ${{ secrets.STRIPE_PRODUCTID_ENTERPRISE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          envs: APP_BASE_URL,COGNITO_DOMAIN,COGNITO_CLIENT_ID,COGNITO_CLIENT_SECRET,COGNITO_REDIRECT_URI,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION,STRIPE_SECRET_KEY,STRIPE_SUCCESS_URL,STRIPE_CANCEL_URL,STRIPE_PRODUCTID_STARTER,STRIPE_PRODUCTID_PROFESSIONAL,STRIPE_PRODUCTID_ENTERPRISE,OPENAI_API_KEY
          script: |
            set -euxo pipefail
            cd /home/ubuntu/apps/beta
            cat > .env.production <<'EOF'
            APP_BASE_URL=${APP_BASE_URL}
            COGNITO_DOMAIN=${COGNITO_DOMAIN}
            COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
            COGNITO_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
            COGNITO_REDIRECT_URI=${COGNITO_REDIRECT_URI:-${APP_BASE_URL}/api/auth/callback}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-${APP_BASE_URL}/success}
            STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-${APP_BASE_URL}/}
            STRIPE_PRODUCTID_STARTER=${STRIPE_PRODUCTID_STARTER}
            STRIPE_PRODUCTID_PROFESSIONAL=${STRIPE_PRODUCTID_PROFESSIONAL}
            STRIPE_PRODUCTID_ENTERPRISE=${STRIPE_PRODUCTID_ENTERPRISE}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            EOF
            # show only first lines (no secrets)
            head -n 5 .env.production || true

      # 3) Pull, install, build
      - name: Deploy build
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -euxo pipefail
            cd /home/ubuntu/apps/beta
            git fetch origin
            git checkout deploy
            git reset --hard origin/deploy
            npm ci --ignore-scripts || npm install --ignore-scripts
            if [ -d node_modules/pdfjs-dist ]; then
              mkdir -p public/pdfjs
              cp -r node_modules/pdfjs-dist/build node_modules/pdfjs-dist/web node_modules/pdfjs-dist/cmaps public/pdfjs/ || true
            fi
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build

      # 4) Restart services
      - name: Restart app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -euxo pipefail
            sudo systemctl restart beta-next
            sudo systemctl reload nginx
            sudo systemctl status beta-next --no-pager | tail -n +1
