name: Deploy Beta App

on:
  push:
    branches: [ deploy ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets exist
        run: |
          set -euo pipefail
          for s in SSH_HOST SSH_USER SSH_KEY_B64 APP_BASE_URL COGNITO_DOMAIN COGNITO_CLIENT_ID COGNITO_CLIENT_SECRET OPENAI_API_KEY; do
            test -n "${{ secrets[$s] }}" || (echo "::error::$s missing" && exit 1)
          done

      - name: Prepare SSH key (decode from base64)
        run: |
          umask 077
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > id_ci.pem
          chmod 600 id_ci.pem
          head -n1 id_ci.pem
          tail -n1 id_ci.pem
          echo "Size (bytes):"; wc -c id_ci.pem

      - name: Smoke test SSH connection
        run: |
          ssh -i id_ci.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'whoami && hostname && echo "✅ SSH OK"'

      - name: Deploy over SSH
        run: |
          ssh -i id_ci.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -se' <<'REMOTE'
            set -euxo pipefail
            cd /home/ubuntu/apps/beta

            echo "== Resetting repo clean =="
            git fetch origin
            git checkout deploy
            git reset --hard origin/deploy
            git clean -fdx   # removes untracked files/dirs

            echo "== Writing .env.production =="
            cat > .env.production <<EOF
            APP_BASE_URL=${{ secrets.APP_BASE_URL }}
            COGNITO_DOMAIN=${{ secrets.COGNITO_DOMAIN }}
            COGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}
            COGNITO_CLIENT_SECRET=${{ secrets.COGNITO_CLIENT_SECRET }}
            COGNITO_REDIRECT_URI=${{ secrets.COGNITO_REDIRECT_URI }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_SUCCESS_URL=${{ secrets.STRIPE_SUCCESS_URL }}
            STRIPE_CANCEL_URL=${{ secrets.STRIPE_CANCEL_URL }}
            STRIPE_PRODUCTID_STARTER=${{ secrets.STRIPE_PRODUCTID_STARTER }}
            STRIPE_PRODUCTID_PROFESSIONAL=${{ secrets.STRIPE_PRODUCTID_PROFESSIONAL }}
            STRIPE_PRODUCTID_ENTERPRISE=${{ secrets.STRIPE_PRODUCTID_ENTERPRISE }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            EOF
            head -n 8 .env.production || true

            echo "== Installing dependencies =="
            npm ci --ignore-scripts || npm install --ignore-scripts

            if [ -d node_modules/pdfjs-dist ]; then
              mkdir -p public/pdfjs
              cp -r node_modules/pdfjs-dist/{build,web,cmaps} public/pdfjs/ || true
            fi

            echo "== Building app =="
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build

            echo "== Restarting services =="
            sudo systemctl restart beta-next
            sudo systemctl reload nginx
            sudo systemctl status beta-next --no-pager | tail -n +1
            REMOTE

        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
          COGNITO_REDIRECT_URI: ${{ secrets.COGNITO_REDIRECT_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SUCCESS_URL: ${{ secrets.STRIPE_SUCCESS_URL }}
          STRIPE_CANCEL_URL: ${{ secrets.STRIPE_CANCEL_URL }}
          STRIPE_PRODUCTID_STARTER: ${{ secrets.STRIPE_PRODUCTID_STARTER }}
          STRIPE_PRODUCTID_PROFESSIONAL: ${{ secrets.STRIPE_PRODUCTID_PROFESSIONAL }}
          STRIPE_PRODUCTID_ENTERPRISE: ${{ secrets.STRIPE_PRODUCTID_ENTERPRISE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}