name: Deploy Beta App

on:
  push:
    branches: [ deploy ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets exist
        run: |
          set -euo pipefail
          test -n "${{ secrets.SSH_HOST }}" || (echo "::error::SSH_HOST missing" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "::error::SSH_USER missing" && exit 1)
          test -n "${{ secrets.SSH_KEY_B64 }}" || (echo "::error::SSH_KEY_B64 missing" && exit 1)
          test -n "${{ secrets.APP_BASE_URL }}" || (echo "::error::APP_BASE_URL missing" && exit 1)
          test -n "${{ secrets.COGNITO_DOMAIN }}" || (echo "::error::COGNITO_DOMAIN missing" && exit 1)
          test -n "${{ secrets.COGNITO_CLIENT_ID }}" || (echo "::error::COGNITO_CLIENT_ID missing" && exit 1)
          test -n "${{ secrets.COGNITO_CLIENT_SECRET }}" || (echo "::error::COGNITO_CLIENT_SECRET missing" && exit 1)
          test -n "${{ secrets.OPENAI_API_KEY }}" || (echo "::error::OPENAI_API_KEY missing" && exit 1)

      - name: Prepare SSH key (decode from base64)
        run: |
          umask 077
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > id_ci.pem
          chmod 600 id_ci.pem
          head -n1 id_ci.pem
          tail -n1 id_ci.pem
          echo "Size (bytes):"; wc -c id_ci.pem

      - name: SSH smoke test
        run: |
          ssh -i id_ci.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'whoami && hostname && test -d /home/ubuntu/apps/beta && echo OK'

      - name: Deploy over SSH
        run: |
          ssh -i id_ci.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -s' <<REMOTE
            set -euo pipefail
            cd /home/ubuntu/apps/beta
      
            # 1) Write .env.production using GitHub secrets (expanded on the runner)
            cat > .env.production <<EOF
            APP_BASE_URL=${{ secrets.APP_BASE_URL }}
            COGNITO_DOMAIN=${{ secrets.COGNITO_DOMAIN }}
            COGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}
            COGNITO_CLIENT_SECRET=${{ secrets.COGNITO_CLIENT_SECRET }}
            COGNITO_REDIRECT_URI=${{ secrets.COGNITO_REDIRECT_URI }}
      
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
      
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_SUCCESS_URL=${{ secrets.STRIPE_SUCCESS_URL }}
            STRIPE_CANCEL_URL=${{ secrets.STRIPE_CANCEL_URL }}
            STRIPE_PRODUCTID_STARTER=${{ secrets.STRIPE_PRODUCTID_STARTER }}
            STRIPE_PRODUCTID_PROFESSIONAL=${{ secrets.STRIPE_PRODUCTID_PROFESSIONAL }}
            STRIPE_PRODUCTID_ENTERPRISE=${{ secrets.STRIPE_PRODUCTID_ENTERPRISE }}
      
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            EOF
      
            # 2) Load values and apply sane defaults if any are empty
            set -a
            . ./.env.production
            set +a
      
            # Fallbacks computed on server (no GitHub expression logic)
            if [ -z "\${COGNITO_REDIRECT_URI:-}" ]; then
            echo "COGNITO_REDIRECT_URI=\${APP_BASE_URL}/api/auth/callback" >> .env.production
            COGNITO_REDIRECT_URI="\${APP_BASE_URL}/api/auth/callback"
            fi
            if [ -z "\${STRIPE_SUCCESS_URL:-}" ]; then
            echo "STRIPE_SUCCESS_URL=\${APP_BASE_URL}/success" >> .env.production
            fi
            if [ -z "\${STRIPE_CANCEL_URL:-}" ]; then
            echo "STRIPE_CANCEL_URL=\${APP_BASE_URL}/" >> .env.production
            fi
      
            echo "== .env.production (first lines) =="
            sed -n '1,8p' .env.production || true
      
            # 3) Update code & build
            git fetch origin
            git checkout deploy
            git reset --hard origin/deploy
      
            npm ci --ignore-scripts || npm install --ignore-scripts
            if [ -d node_modules/pdfjs-dist ]; then
            mkdir -p public/pdfjs
            cp -r node_modules/pdfjs-dist/{build,web,cmaps} public/pdfjs/ || true
            fi
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build
      
            # 4) Restart services
            sudo systemctl restart beta-next
            sudo systemctl reload nginx
            sudo systemctl status beta-next --no-pager | tail -n +1
            REMOTE

        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
          COGNITO_REDIRECT_URI: ${{ secrets.COGNITO_REDIRECT_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_SUCCESS_URL: ${{ secrets.STRIPE_SUCCESS_URL }}
          STRIPE_CANCEL_URL: ${{ secrets.STRIPE_CANCEL_URL }}
          STRIPE_PRODUCTID_STARTER: ${{ secrets.STRIPE_PRODUCTID_STARTER }}
          STRIPE_PRODUCTID_PROFESSIONAL: ${{ secrets.STRIPE_PRODUCTID_PROFESSIONAL }}
          STRIPE_PRODUCTID_ENTERPRISE: ${{ secrets.STRIPE_PRODUCTID_ENTERPRISE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
