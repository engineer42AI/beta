name: SSH Secret Smoke Test
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fail fast if SSH_HOST/SSH_USER missing
        run: |
          set -euo pipefail
          test -n "${{ secrets.SSH_HOST }}" || (echo "::error::SSH_HOST missing" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "::error::SSH_USER missing" && exit 1)
          test -n "${{ secrets.SSH_KEY }}"  || (echo "::error::SSH_KEY missing"  && exit 1)
          echo "All required secrets are present."

      - name: Write SSH private key to file (preserve newlines)
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          cat > id_ci.pem <<'EOF'
          ${{ secrets.SSH_KEY }}
          EOF
          # sanity checks without leaking the key
          head -n1 id_ci.pem
          tail -n1 id_ci.pem
          wc -c id_ci.pem

      - name: Test SSH connectivity
        shell: bash
        run: |
          set -euxo pipefail
          ssh -i id_ci.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'whoami && hostname && echo OK'
